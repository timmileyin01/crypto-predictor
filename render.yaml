services:
  # Python ML Service
  - type: web
    name: cryptolstm-ml
    runtime: python
    rootDir: ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"

  # Express Backend
  - type: web
    name: cryptolstm-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production